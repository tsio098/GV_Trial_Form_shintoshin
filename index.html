<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>グレイトヴォヤージュ — 体験授業お申し込み</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      background: #f6faff;
      color: #171c20;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
    }
    .logo { width: 180px; height: auto; margin-bottom: 8px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e4e9ee;
      border-top-color: #002045;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 14px;
      color: #43474e;
      text-align: center;
      line-height: 1.6;
    }
    .error-box {
      display: none;
      background: #fff3f3;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      padding: 20px;
      max-width: 320px;
      text-align: center;
      font-size: 14px;
      color: #b91c1c;
      line-height: 1.6;
    }
    .error-box.show { display: block; }

    /* ─── GAS iframe（認証後に表示） ─── */
    #gas-frame {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      z-index: 100;
    }
    #gas-frame.active { display: block; }

    /* ─── ローディング画面 ─── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
  </style>
</head>
<body>

  <!-- 認証中画面 -->
  <div id="auth-screen">
    <img class="logo"
         src="https://lh3.googleusercontent.com/d/1gsyaqDZvfGt-dRsoaCoTIUxa8GGIoEZU"
         alt="グレイトヴォヤージュ"/>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status">認証中...</p>
    <div class="error-box" id="error-box"></div>
  </div>

  <!-- GASフォーム表示用 iframe -->
  <iframe id="gas-frame"></iframe>

  <script>
    // ============================================================
    //  設定
    // ============================================================

    // ★★ 体験生フォーム用 LIFF ID に書き換えてください ★★
    // LINE Developers Console で新しい LIFF アプリを作成し、
    // Endpoint URL に このファイルを公開している GitHub Pages の URL を設定します
    var LIFF_ID = '2009771008-B9WfpUBS';  // ← 変更してください

    // ★★ 入塾登録フォームと同じ GAS デプロイURL を使用します ★★
    // （Code.gs に trial.html を追加して再デプロイした URL）
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbx9IwWWsLqgJ60qo9PRiVxuJA81gCzcKf4h5JbY-4iFqxXDt2VfAjVfJLH-aOvu6ROt/exec';

    var _userId = '';

    // ============================================================
    //  UI ヘルパー
    // ============================================================
    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      var errBox = document.getElementById('error-box');
      errBox.innerHTML = msg || '読み込みに失敗しました。<br/>LINEアプリからもう一度開き直してください。';
      errBox.classList.add('show');
    }

    // ============================================================
    //  GAS を iframe で読み込む
    //  page=trial を付与して体験生フォームを表示
    // ============================================================
    function loadGAS(userId) {
      if (!userId) {
        showError('ユーザーIDを取得できませんでした。<br/>LINEアプリを再起動して試してください。');
        return;
      }
      _userId = userId;
      // ★ page=trial を付与することで doGet が trial.html を返す
      var url = GAS_URL + '?page=trial&uid=' + encodeURIComponent(userId);
      setStatus('フォームを読み込み中...');

      var frame = document.getElementById('gas-frame');
      frame.src = url;
      frame.onload = function() {
        document.getElementById('auth-screen').style.display = 'none';
        frame.classList.add('active');
      };
    }

    // ============================================================
    //  LIFF 初期化 & userId 取得
    // ============================================================
    var _globalTimeout = setTimeout(function() {
      showError('認証がタイムアウトしました。<br/>LINEアプリを再起動してお試しください。');
    }, 15000);

    liff.init({ liffId: LIFF_ID })
      .then(function() {
        if (!liff.isLoggedIn()) {
          setStatus('LINEログインへ移動...');
          liff.login();
          return;
        }

        setStatus('ユーザー情報を取得中...');

        // 方法1: getContext()
        try {
          var ctx = liff.getContext();
          if (ctx && ctx.userId) {
            clearTimeout(_globalTimeout);
            loadGAS(ctx.userId);
            return;
          }
        } catch(e) {}

        // 方法2: getDecodedIDToken()
        try {
          var tok = liff.getDecodedIDToken();
          if (tok && tok.sub) {
            clearTimeout(_globalTimeout);
            loadGAS(tok.sub);
            return;
          }
        } catch(e) {}

        // 方法3: getProfile()（8秒タイムアウト）
        var profileDone = false;
        var profileTimer = setTimeout(function() {
          if (!profileDone) {
            profileDone = true;
            clearTimeout(_globalTimeout);
            showError('ユーザー情報の取得がタイムアウトしました。<br/>LINEアプリを再起動してお試しください。');
          }
        }, 8000);

        liff.getProfile()
          .then(function(p) {
            if (profileDone) return;
            profileDone = true;
            clearTimeout(profileTimer);
            clearTimeout(_globalTimeout);
            if (p && p.userId) {
              loadGAS(p.userId);
            } else {
              showError('プロフィール情報にユーザーIDが含まれていません。');
            }
          })
          .catch(function(e) {
            if (profileDone) return;
            profileDone = true;
            clearTimeout(profileTimer);
            clearTimeout(_globalTimeout);
            showError('プロフィール取得エラー: ' + e.message);
          });
      })
      .catch(function(err) {
        clearTimeout(_globalTimeout);
        showError('LIFF初期化エラー: ' + err.message + '<br/>LINEアプリから開いているか確認してください。');
      });
  </script>

</body>
</html>
