<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GV — 体験授業お申し込み</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      background: #f6faff;
      color: #171c20;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
    }
    .logo { width: 180px; height: auto; margin-bottom: 8px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e4e9ee;
      border-top-color: #002045;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .spinner-green {
      width: 48px; height: 48px;
      border: 4px solid #d1fae5;
      border-top-color: #06C755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 14px;
      color: #43474e;
      text-align: center;
      line-height: 1.6;
    }
    .error-box {
      display: none;
      background: #fff3f3;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      padding: 20px;
      max-width: 320px;
      text-align: center;
      font-size: 14px;
      color: #b91c1c;
      line-height: 1.6;
    }
    .error-box.show { display: block; }

    /* ─── GAS iframe ─── */
    #gas-frame {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      z-index: 100;
    }
    #gas-frame.active { display: block; }

    /* ─── 認証中ローディング ─── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    /* ─── 友達追加パネル ─── */
    #friend-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 340px;
      width: 100%;
      text-align: center;
    }
    #friend-screen.show { display: flex; }

    .line-icon-wrap {
      width: 88px; height: 88px;
      border-radius: 22px;
      background-color: #06C755;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(6,199,85,0.3);
    }

    .friend-title {
      font-size: 20px;
      font-weight: 800;
      color: #002045;
      line-height: 1.4;
    }
    .friend-desc {
      font-size: 13px;
      color: #43474e;
      line-height: 1.7;
    }

    .btn-line-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      background-color: #06C755;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(6,199,85,0.35);
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-line-add:active { opacity: 0.8; }

    .checking-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .checking-wrap.show { display: flex; }
    .checking-text {
      font-size: 13px;
      color: #43474e;
    }

    .notice-box {
      background: #f0f4fa;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 12px;
      color: #43474e;
      line-height: 1.6;
      text-align: left;
      width: 100%;
    }
    .btn-manual-proceed {
      display: none;
      width: 100%;
      padding: 14px 24px;
      background-color: #002045;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.15s;
    }
    .btn-manual-proceed.show { display: block; }
    .btn-manual-proceed:active { opacity: 0.8; }
  </style>
</head>
<body>

  <!-- 認証中画面 -->
  <div id="auth-screen">
    <img class="logo"
         src="https://lh3.googleusercontent.com/d/1Ecr278PF9Qw_OfV5s3GjOPGpiiBIHPAH"
         alt="GV"/>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status">認証中...</p>
    <div class="error-box" id="error-box"></div>
  </div>

  <!-- 友達追加パネル（未フォロー時のみ表示） -->
  <div id="friend-screen">
    <img class="logo"
         src="https://lh3.googleusercontent.com/d/1Ecr278PF9Qw_OfV5s3GjOPGpiiBIHPAH"
         alt="GV"/>

    <div class="line-icon-wrap">
      <!-- LINE ロゴ -->
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" width="56" height="56">
        <path d="M34 17.2C34 11.115 27.732 6.2 20 6.2S6 11.115 6 17.2c0 5.418 4.808 9.956 11.3 10.813.44.095 1.04.29 1.19.667.136.342.089.878.044 1.225l-.192 1.155c-.059.342-.27 1.338 1.17.73 1.44-.61 7.768-4.574 10.6-7.83C31.966 21.674 34 19.58 34 17.2z" fill="white"/>
      </svg>
    </div>

    <div>
      <p class="friend-title">LINE公式アカウントを<br/>友達追加してください</p>
    </div>
    <p class="friend-desc">
      体験授業の日程・持ち物・当日の連絡など<br/>重要なご案内をLINEでお届けします。<br/>まだ友達追加がお済みでない方は<br/>下のボタンから追加してください。
    </p>

    <a id="btn-add-friend" href="https://line.me/R/ti/p/@518qcqye"
       class="btn-line-add" onclick="onAddFriendClick(event)">
      <svg viewBox="0 0 24 24" fill="white" width="22" height="22">
        <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.07 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
      </svg>
      友達追加する
    </a>

    <button class="btn-manual-proceed" id="btn-manual-proceed" onclick="onManualProceed()">
      友達追加しました → フォームに進む
    </button>

    <div class="notice-box">
      LINE公式アカウントを友達追加したら、<br/>
      上の「フォームに進む」ボタンをタップしてください。
    </div>
  </div>

  <!-- GASフォーム表示用 iframe -->
  <iframe id="gas-frame"></iframe>

  <script>
    // ============================================================
    //  設定
    // ============================================================

    // ★★ 体験生フォーム用 LIFF ID ★★
    var LIFF_ID = '2009771008-B9WfpUBS';

    // ★★ GASの最新デプロイURL ★★
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbx9IwWWsLqgJ60qo9PRiVxuJA81gCzcKf4h5JbY-4iFqxXDt2VfAjVfJLH-aOvu6ROt/exec';

    var _userId = '';

    // ============================================================
    //  UI ヘルパー
    // ============================================================
    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      var errBox = document.getElementById('error-box');
      errBox.innerHTML = msg || '読み込みに失敗しました。<br/>LINEアプリからもう一度開き直してください。';
      errBox.classList.add('show');
    }

    // ============================================================
    //  GAS を iframe で読み込む
    // ============================================================
    function loadGAS(userId) {
      if (!userId) {
        showError('ユーザーIDを取得できませんでした。<br/>LINEアプリを再起動して試してください。');
        return;
      }
      _userId = userId;
      var url = GAS_URL + '?page=trial&uid=' + encodeURIComponent(userId);
      setStatus('フォームを読み込み中...');

      var frame = document.getElementById('gas-frame');
      frame.src = url;
      frame.onload = function() {
        document.getElementById('auth-screen').style.display  = 'none';
        document.getElementById('friend-screen').classList.remove('show');
        frame.classList.add('active');
      };
    }

    // ============================================================
    //  友達追加パネルを表示
    // ============================================================
    function showFriendScreen() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('friend-screen').classList.add('show');
    }

    // ============================================================
    //  友達追加ボタンを押したとき
    // ============================================================
    function onAddFriendClick(e) {
      e.preventDefault();
      window.open('https://line.me/R/ti/p/@518qcqye', '_blank');
      // 手動ボタンを表示（友達追加後、ユーザー自身がタップしてフォームへ進む）
      document.getElementById('btn-manual-proceed').classList.add('show');
    }

    function onManualProceed() {
      loadGAS(_userId);
    }

    // ============================================================
    //  友達状態をチェックして分岐
    //  ・既に友達 → そのままフォームへ
    //  ・未フォロー → 友達追加パネルを表示
    //  ・getFriendship が使えない（Bot link feature 未設定）
    //    → エラーを無視してフォームへ（フォールバック）
    // ============================================================
    function checkFriendshipAndLoad(userId) {
      _userId = userId; // ★ Fix: ここで必ずセットしておく（pollFriendship で使うため）
      liff.getFriendship()
        .then(function(result) {
          if (result.friendFlag) {
            // 既に友達 → 直接フォームへ
            loadGAS(userId);
          } else {
            // 未フォロー → 友達追加パネルを表示
            showFriendScreen();
          }
        })
        .catch(function() {
          // Bot link feature 未設定などのエラー → フォールバックでそのまま進む
          loadGAS(userId);
        });
    }

    // ============================================================
    //  LIFF 初期化 & userId 取得
    // ============================================================
    var _globalTimeout = setTimeout(function() {
      showError('認証がタイムアウトしました。<br/>LINEアプリを再起動してお試しください。');
    }, 15000);

    liff.init({ liffId: LIFF_ID })
      .then(function() {
        if (!liff.isLoggedIn()) {
          setStatus('LINEログインへ移動...');
          liff.login();
          return;
        }

        setStatus('ユーザー情報を取得中...');

        // 方法1: getContext()
        try {
          var ctx = liff.getContext();
          if (ctx && ctx.userId) {
            clearTimeout(_globalTimeout);
            checkFriendshipAndLoad(ctx.userId);
            return;
          }
        } catch(e) {}

        // 方法2: getDecodedIDToken()
        try {
          var tok = liff.getDecodedIDToken();
          if (tok && tok.sub) {
            clearTimeout(_globalTimeout);
            checkFriendshipAndLoad(tok.sub);
            return;
          }
        } catch(e) {}

        // 方法3: getProfile()（8秒タイムアウト）
        var profileDone = false;
        var profileTimer = setTimeout(function() {
          if (!profileDone) {
            profileDone = true;
            clearTimeout(_globalTimeout);
            showError('ユーザー情報の取得がタイムアウトしました。<br/>LINEアプリを再起動してお試しください。');
          }
        }, 8000);

        liff.getProfile()
          .then(function(p) {
            if (profileDone) return;
            profileDone = true;
            clearTimeout(profileTimer);
            clearTimeout(_globalTimeout);
            if (p && p.userId) {
              checkFriendshipAndLoad(p.userId);
            } else {
              showError('プロフィール情報にユーザーIDが含まれていません。');
            }
          })
          .catch(function(e) {
            if (profileDone) return;
            profileDone = true;
            clearTimeout(profileTimer);
            clearTimeout(_globalTimeout);
            showError('プロフィール取得エラー: ' + e.message);
          });
      })
      .catch(function(err) {
        clearTimeout(_globalTimeout);
        showError('LIFF初期化エラー: ' + err.message + '<br/>LINEアプリから開いているか確認してください。');
      });
  </script>

</body>
</html>
